<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STM Referee</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #161a23;
      --surface2: #1c2130;
      --border:   #252b38;
      --home:     #3b8bff;
      --away:     #ff5c6a;
      --text:     #eef0f6;
      --muted:    #6b7280;
      --server:   #f5c518;
      --green:    #22c55e;
      --radius:   16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 48px;
    }

    header { text-align: center; margin-bottom: 24px; }
    header .label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px; letter-spacing: 4px; color: var(--muted);
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 34px; letter-spacing: 3px; line-height: 1;
    }

    .card {
      width: 100%; max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* Lookup */
    .lookup {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
    }
    .lookup-row { display: flex; gap: 8px; }
    .lookup input {
      flex: 1; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 13px; padding: 9px 12px; outline: none;
      transition: border-color .2s;
    }
    .lookup input::placeholder { color: var(--muted); }
    .lookup input:focus { border-color: var(--home); }
    .lookup button {
      background: var(--home); border: none; border-radius: 10px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      padding: 9px 18px; cursor: pointer; transition: opacity .2s;
    }
    .lookup button:hover { opacity: .85; }

    /* Scoreboard */
    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: stretch;
    }
    .team { display: flex; flex-direction: column; padding: 20px 16px 18px; }
    .team.home { align-items: flex-start; }
    .team.away { align-items: flex-end; }
    .team-tag {
      font-size: 10px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
    }
    .home .team-tag { color: var(--home); }
    .away .team-tag { color: var(--away); }

    .players { display: flex; flex-direction: column; gap: 5px; flex: 1; margin-bottom: 16px; }
    .player-row {
      display: flex; align-items: center; gap: 7px;
      cursor: pointer; border-radius: 8px; padding: 4px 6px;
      transition: background .15s;
    }
    .player-row:hover { background: rgba(255,255,255,.04); }
    .home .player-row { flex-direction: row; }
    .away .player-row { flex-direction: row-reverse; }

    .player-num {
      width: 20px; height: 20px; border-radius: 50%;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .2s, color .2s;
    }
    .home .player-num { background: rgba(59,139,255,.15); color: var(--home); }
    .away .player-num { background: rgba(255,92,106,.15); color: var(--away); }
    .player-name { font-size: 13px; font-weight: 500; line-height: 1.2; }
    .player-name.tbd { color: var(--muted); font-style: italic; }
    .serve-icon { font-size: 13px; opacity: 0; transition: opacity .25s; flex-shrink: 0; }
    .serve-icon.active { opacity: 1; }

    .score-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .score-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 68px; line-height: 1; min-width: 56px; text-align: center;
    }
    .score-btns { display: flex; gap: 6px; }
    .score-btn {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .score-btn.plus { border-color: var(--home); color: var(--home); }
    .score-btn.plus:hover { background: rgba(59,139,255,.15); }
    .score-btn.minus { color: var(--muted); }
    .score-btn.minus:hover { background: var(--border); }

    .vs-col {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px 0; gap: 8px;
    }
    .vs-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px; letter-spacing: 2px; color: var(--muted);
    }
    .vs-divider { width: 1px; flex: 1; background: var(--border); }

    /* ── SERVE TRACKER ── */
    .serve-tracker {
      border-top: 1px solid var(--border);
      background: var(--surface2);
      padding: 14px 16px 16px;
    }
    .serve-tracker-title {
      font-size: 10px; font-weight: 600; letter-spacing: 2px;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 12px; text-align: center;
    }

    /* First-serve warning */
    .first-serve-badge {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: rgba(245,197,24,.08);
      border: 1px solid rgba(245,197,24,.3);
      border-radius: 8px; padding: 8px 12px; margin-bottom: 12px;
      font-size: 12px; font-weight: 500; color: #d4a800;
      animation: badgePulse 2s infinite;
    }
    .first-serve-badge.hidden { display: none; }
    @keyframes badgePulse {
      0%,100% { border-color: rgba(245,197,24,.25); }
      50%      { border-color: rgba(245,197,24,.6); }
    }

    /* Announce bar */
    .serve-announce {
      display: flex; align-items: stretch;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; margin-bottom: 12px;
    }
    .announce-seg {
      flex: 1; text-align: center;
      padding: 10px 6px;
      border-right: 1px solid var(--border);
    }
    .announce-seg:last-child { border-right: none; }
    .announce-label {
      font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
      color: var(--muted); text-transform: uppercase; margin-bottom: 3px;
    }
    .announce-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 1px; line-height: 1;
      transition: color .2s;
    }
    .team-home { color: var(--home); }
    .team-away { color: var(--away); }

    /* Pip row */
    .pip-row {
      display: flex; gap: 5px; justify-content: center; margin-top: 5px;
    }
    .serve-pip {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--border);
      transition: background .25s, box-shadow .25s;
    }
    .serve-pip.active { background: var(--server); box-shadow: 0 0 7px var(--server); }
    .serve-pip.used   { background: var(--muted); }

    /* Serve controls */
    .serve-controls {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .serve-btn {
      padding: 11px 8px; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity .2s, transform .1s; text-align: center;
      line-height: 1.4;
    }
    .serve-btn:active { transform: scale(.97); }
    .btn-fault {
      background: rgba(245,197,24,.13); color: var(--server);
      border: 1px solid rgba(245,197,24,.3);
    }
    .btn-fault:hover { background: rgba(245,197,24,.22); }
    .btn-sideout {
      background: rgba(255,255,255,.05); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-sideout:hover { background: rgba(255,255,255,.1); }
    .serve-btn small {
      display: block; font-size: 11px; font-weight: 400; opacity: .65; margin-top: 2px;
    }

    /* Status */
    .status-bar {
      padding: 9px 18px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .status-dot.live {
      background: var(--green); box-shadow: 0 0 7px #22c55e88;
      animation: pulse 1.8s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .status-text { font-size: 12px; font-weight: 500; color: var(--muted); }
    .status-text.live { color: var(--green); }

    /* Actions */
    .actions {
      padding: 14px 16px 18px; border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .action-btn {
      flex: 1; padding: 12px; border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .2s, transform .1s;
    }
    .action-btn:active { transform: scale(.98); }
    .btn-sides { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sides:hover { background: var(--border); }
    .btn-done { background: var(--green); color: #fff; }
    .btn-done:hover { opacity: .88; }
    .btn-done.off { background: var(--border); color: var(--muted); cursor: not-allowed; }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1e2530; border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 18px;
      font-size: 13px; font-weight: 500; color: var(--text);
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 400px) {
      .score-value { font-size: 54px; }
      .team { padding: 16px 12px 14px; }
      .announce-value { font-size: 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="label">Live Match</div>
  <h1>STM Referee</h1>
</header>

<div class="card">

  <!-- Lookup -->
  <div class="lookup">
    <div class="lookup-row">
      <input id="tourInput" placeholder="Tournament ID" value="5401c8aa-f76f-4f49-b5fa-77341e1a4afb">
    </div>
    <div class="lookup-row">
      <input id="matchInput" placeholder="Match ID">
      <button id="findBtn">Find</button>
    </div>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">

    <div class="team home">
      <div class="team-tag">Home</div>
      <div class="players">
        <div class="player-row" data-player="p1h">
          <div class="player-num">1</div>
          <div class="player-name tbd" id="homeP1">—</div>
          <div class="serve-icon" id="icon-p1h">🏓</div>
        </div>
        <div class="player-row" data-player="p2h">
          <div class="player-num">2</div>
          <div class="player-name tbd" id="homeP2">—</div>
          <div class="serve-icon" id="icon-p2h">🏓</div>
        </div>
      </div>
      <div class="score-wrap">
        <div class="score-value" id="homeScoreDisplay">0</div>
        <div class="score-btns">
          <button class="score-btn minus" data-team="home" data-delta="-1">−</button>
          <button class="score-btn plus"  data-team="home" data-delta="1">+</button>
        </div>
      </div>
    </div>

    <div class="vs-col">
      <div class="vs-divider"></div>
      <div class="vs-text">VS</div>
      <div class="vs-divider"></div>
    </div>

    <div class="team away">
      <div class="team-tag">Away</div>
      <div class="players">
        <div class="player-row" data-player="p1a">
          <div class="serve-icon" id="icon-p1a">🏓</div>
          <div class="player-name tbd" id="awayP1">—</div>
          <div class="player-num">1</div>
        </div>
        <div class="player-row" data-player="p2a">
          <div class="serve-icon" id="icon-p2a">🏓</div>
          <div class="player-name tbd" id="awayP2">—</div>
          <div class="player-num">2</div>
        </div>
      </div>
      <div class="score-wrap">
        <div class="score-value" id="awayScoreDisplay">0</div>
        <div class="score-btns">
          <button class="score-btn minus" data-team="away" data-delta="-1">−</button>
          <button class="score-btn plus"  data-team="away" data-delta="1">+</button>
        </div>
      </div>
    </div>

  </div>

  <!-- ── SERVE TRACKER ── -->
  <div class="serve-tracker">
    <div class="serve-tracker-title">Serve Tracker · Pickleball</div>

    <!-- First-serve warning -->
    <div class="first-serve-badge hidden" id="firstServeBadge">
      ⚠️ Quả giao đầu trận — chỉ 1 lượt giao (người số 2 giao trước)
    </div>

    <!-- Announce bar: ĐỘI · NGƯỜI · LƯỢT -->
    <div class="serve-announce">
      <div class="announce-seg">
        <div class="announce-label">Đội giao</div>
        <div class="announce-value" id="announceTeam">—</div>
      </div>
      <div class="announce-seg">
        <div class="announce-label">Người giao</div>
        <div class="announce-value" id="announcePlayer">—</div>
        <div class="pip-row">
          <div class="serve-pip" id="pip1"></div>
          <div class="serve-pip" id="pip2"></div>
        </div>
      </div>
      <div class="announce-seg">
        <div class="announce-label">Lượt giao</div>
        <div class="announce-value" id="announceServe" style="color:var(--server)">—</div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="serve-controls">
      <button class="serve-btn btn-fault" id="faultBtn">
        ✗ Fault
        <small>lỗi → đổi người giao</small>
      </button>
      <button class="serve-btn btn-sideout" id="sideoutBtn">
        ⇄ Side Out
        <small>đổi bên giao bóng</small>
      </button>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">No match loaded</div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="action-btn btn-sides" id="changeSidesBtn">⇄ Đổi sân</button>
    <button class="action-btn btn-done off" id="doneBtn">🏁 Kết thúc</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp }      from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

   const firebaseConfig = { 
		apiKey: "AIzaSyD6tKItFtCJDYDxSLClLjJDqdR0scsU4kg",
		authDomain: "fir-demo-a1c99.firebaseapp.com",
		databaseURL: "https://fir-demo-a1c99.firebaseio.com",
		projectId: "fir-demo-a1c99",
		storageBucket: "fir-demo-a1c99.firebasestorage.app",
		messagingSenderId: "980490887183",
		appId: "1:980490887183:web:ef665624ab306006d7037a",
		measurementId: "G-TR0CCTRTGJ"
	};
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  const $ = id => document.getElementById(id);

  // ── App State ──────────────────────────────────────────────────────────────
  let currentMatchId = null;
  let currentTourId  = null;
  let homePlayers    = ["", ""];
  let awayPlayers    = ["", ""];
  let homeScore      = 0;
  let awayScore      = 0;

  /**
   * Pickleball serve state machine
   *
   *  LUẬT:
   *  • Quả đầu trận: đội giao chỉ được 1 lượt (luôn là người số 2, "second server")
   *  • Bình thường : lượt 1 (P1) → fault → lượt 2 (P2) → fault → side out → đội kia lượt 1
   *
   *  State fields:
   *    team         : "home" | "away"
   *    player       : 1 | 2
   *    serveNumber  : 1 | 2   (lượt trong lượt đội đó)
   *    isFirstServe : true    (chỉ true cho quả giao đầu tiên của cả trận)
   */
  let serve = {
    team:         "home",
    player:       2,
    serveNumber:  2,
    isFirstServe: true,
  };

  // ── Toast ──────────────────────────────────────────────────────────────────
  function toast(msg, ms = 2400) {
    const el = $("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove("show"), ms);
  }

  // ── Serve render ───────────────────────────────────────────────────────────
  function renderServe() {
    const teamLabel = serve.team === "home" ? "HOME" : "AWAY";
    const teamCls   = "announce-value team-" + serve.team;

    $("announceTeam").textContent = teamLabel;
    $("announceTeam").className   = teamCls;

    $("announcePlayer").textContent = "P" + serve.player;
    $("announceServe").textContent  = serve.serveNumber + (serve.serveNumber === 1 ? "st" : "nd");

    // Pips: visualise lượt 1 / lượt 2
    if (serve.isFirstServe) {
      // Quả đầu: chỉ lượt 2 → pip1 grayed, pip2 sáng
      $("pip1").className = "serve-pip used";
      $("pip2").className = "serve-pip active";
    } else {
      $("pip1").className = serve.serveNumber === 1 ? "serve-pip active" : "serve-pip used";
      $("pip2").className = serve.serveNumber === 2 ? "serve-pip active" : "serve-pip";
    }

    // Racket icon
    ["p1h","p2h","p1a","p2a"].forEach(id => $("icon-"+id).classList.remove("active"));
    const iconKey = serve.team === "home"
      ? (serve.player === 1 ? "p1h" : "p2h")
      : (serve.player === 1 ? "p1a" : "p2a");
    $("icon-"+iconKey).classList.add("active");

    // First-serve badge
    $("firstServeBadge").classList.toggle("hidden", !serve.isFirstServe);
  }

  // ── Fault ──────────────────────────────────────────────────────────────────
  // Fault = người đang giao lỗi.
  // Quả đầu / lượt 2 → side out ngay.
  // Lượt 1 → chuyển sang người 2 (lượt 2).
  function onFault() {
    if (serve.isFirstServe || serve.serveNumber === 2) {
      doSideOut();
    } else {
      // Lượt 1 → đổi sang người kia, lượt 2
      serve.player      = serve.player === 1 ? 2 : 1;
      serve.serveNumber = 2;
      renderServe();
      toast("Fault → " + (serve.team === "home" ? "HOME" : "AWAY")
            + " P" + serve.player + " · lượt 2");
    }
  }

  // ── Side Out ───────────────────────────────────────────────────────────────
  function doSideOut() {
    serve.team        = serve.team === "home" ? "away" : "home";
    serve.player      = 1;
    serve.serveNumber = 1;
    serve.isFirstServe = false;
    renderServe();
    toast("Side Out → " + (serve.team === "home" ? "HOME" : "AWAY") + " giao · lượt 1");
  }

  // ── Score update ───────────────────────────────────────────────────────────
  async function updateScore(team, delta) {
    if (!currentMatchId) return toast("Chưa load trận");
    const path = `tournaments/${currentTourId}/matches/${currentMatchId}`;
    const snap = await get(ref(db, path));
    if (snap.exists() && snap.val().state === "FINISHED") return toast("Trận đã kết thúc");

    if (team === "home") homeScore = Math.max(0, homeScore + delta);
    else                 awayScore = Math.max(0, awayScore + delta);
    renderScores();

    await update(ref(db, path), { homeScore, awayScore, state: "ONGOING", isChangeSides: false });
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function renderScores() {
    $("homeScoreDisplay").textContent = homeScore;
    $("awayScoreDisplay").textContent = awayScore;
  }

  function renderPlayers() {
    [["homeP1",0],["homeP2",1]].forEach(([id,i]) => {
      const el = $(id);
      el.textContent = homePlayers[i] || "—";
      el.className   = "player-name" + (homePlayers[i] ? "" : " tbd");
    });
    [["awayP1",0],["awayP2",1]].forEach(([id,i]) => {
      const el = $(id);
      el.textContent = awayPlayers[i] || "—";
      el.className   = "player-name" + (awayPlayers[i] ? "" : " tbd");
    });
  }

  function setStatus(state) {
    const dot  = $("statusDot");
    const text = $("statusText");
    dot.className = "status-dot";
    if (state === "ONGOING")  {
      dot.classList.add("live");
      text.textContent = "LIVE"; text.className = "status-text live";
    } else if (state === "FINISHED") {
      text.textContent = "FINISHED"; text.className = "status-text";
    } else {
      text.textContent = "Scheduled"; text.className = "status-text";
    }
    $("doneBtn").className = "action-btn btn-done" + (state === "FINISHED" ? " off" : "");
  }

  // ── Load match ─────────────────────────────────────────────────────────────
  async function loadMatch() {
    const matchId = $("matchInput").value.trim();
    const tourId  = $("tourInput").value.trim();
    if (!matchId || !tourId) return toast("⚠️ Nhập đầy đủ ID");

    const snap = await get(ref(db, `tournaments/${tourId}/matches/${matchId}`));
    if (!snap.exists()) return toast("❌ Không tìm thấy trận");
    const d = snap.val();

    currentMatchId = matchId;
    currentTourId  = tourId;
    homePlayers    = (d.home || "").split(/\s*[-–—+]\s*/).map(p => p.trim());
    awayPlayers    = (d.away || "").split(/\s*[-–—+]\s*/).map(p => p.trim());
    homeScore      = d.homeScore ?? 0;
    awayScore      = d.awayScore ?? 0;

    serve = { team: "home", player: 2, serveNumber: 2, isFirstServe: true };

    renderPlayers();
    renderScores();
    renderServe();
    setStatus(d.state || "SCHEDULED");
    toast("✅ Đã load trận");
  }

  // ── Change sides ───────────────────────────────────────────────────────────
  async function changeSides() {
    if (!currentMatchId) return toast("Chưa load trận");
    const path = `tournaments/${currentTourId}/matches/${currentMatchId}`;
    const snap = await get(ref(db, path));
    if (snap.exists() && snap.val().state === "FINISHED") return toast("Trận đã kết thúc");

    [homePlayers, awayPlayers] = [awayPlayers, homePlayers];
    [homeScore, awayScore]     = [awayScore, homeScore];
    serve.team = serve.team === "home" ? "away" : "home";

    renderPlayers(); renderScores(); renderServe();

    await update(ref(db, path), {
      home: homePlayers.join("-"),
      away: awayPlayers.join("-"),
      homeScore, awayScore, isChangeSides: true
    });
    toast("⇄ Đổi sân");
  }

  // ── Set done ───────────────────────────────────────────────────────────────
  async function setDone() {
    if (!currentMatchId) return;
    const path = `tournaments/${currentTourId}/matches/${currentMatchId}`;
    await update(ref(db, path), { isChangeSides: false, state: "FINISHED" });
    setStatus("FINISHED");
    toast("🏁 Trận kết thúc!");
  }

  // ── Events ─────────────────────────────────────────────────────────────────
  $("findBtn").addEventListener("click", loadMatch);
  $("matchInput").addEventListener("keydown", e => e.key === "Enter" && loadMatch());

  document.querySelectorAll(".score-btn").forEach(btn =>
    btn.addEventListener("click", () => updateScore(btn.dataset.team, parseInt(btn.dataset.delta)))
  );

  $("faultBtn").addEventListener("click", onFault);
  $("sideoutBtn").addEventListener("click", doSideOut);
  $("changeSidesBtn").addEventListener("click", changeSides);
  $("doneBtn").addEventListener("click", () => {
    if (!$("doneBtn").classList.contains("off")) setDone();
  });

  // Tap player row để set thủ công ai đang giao
  document.querySelectorAll(".player-row").forEach(row => {
    row.addEventListener("click", () => {
      if (!currentMatchId) return;
      const key = row.dataset.player;          // p1h / p2h / p1a / p2a
      serve.team        = key.endsWith("h") ? "home" : "away";
      serve.player      = key.startsWith("p1") ? 1 : 2;
      serve.serveNumber = serve.player;         // P1 → lượt 1, P2 → lượt 2
      serve.isFirstServe = false;
      renderServe();
      toast("Giao: " + (serve.team === "home" ? "HOME" : "AWAY") + " P" + serve.player);
    });
  });
</script>
</body>
</html>
