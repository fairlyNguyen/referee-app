<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách trận đấu</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD6tKItFtCJDYDxSLClLjJDqdR0scsU4kg",
      authDomain: "fir-demo-a1c99.firebaseapp.com",
      databaseURL: "https://fir-demo-a1c99.firebaseio.com",
      projectId: "fir-demo-a1c99",
      storageBucket: "fir-demo-a1c99.firebasestorage.app",
      messagingSenderId: "980490887183",
      appId: "1:980490887183:web:ef665624ab306006d7037a",
      measurementId: "G-TR0CCTRTGJ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ✅ Check URL param for save permission
    const urlParams = new URLSearchParams(window.location.search);
    const isReferBoom = urlParams.get("isRefer") === "boom";

    function showLoadingOverlay() {
      document.getElementById("loadingOverlay").classList.remove("hidden");
    }

    function hideLoadingOverlay() {
      document.getElementById("loadingOverlay").classList.add("hidden");
    }

    function loadAllMatches() {
      const tourId = document.getElementById("tourInput").value.trim();
      if (!tourId) return alert("⚠️ Nhập Tournament ID!");

      showLoadingOverlay();

      const path = `tournaments/${tourId}/matches`;
      const matchesRef = ref(db, path);

      onValue(matchesRef, (snapshot) => {
        const container = document.getElementById("matchesContainer");
        container.innerHTML = "";

        if (!snapshot.exists()) {
          container.innerHTML = "<p style='text-align: center; padding: 40px; color: #666;'>❌ Không tìm thấy trận đấu nào</p>";
          hideLoadingOverlay();
          return;
        }

        const matches = snapshot.val();
        const grouped = {};

        Object.entries(matches).forEach(([matchId, data]) => {
          const groupName = data.groupName || "Khác";
          if (!grouped[groupName]) grouped[groupName] = [];
          grouped[groupName].push({ matchId, ...data });
        });

        Object.entries(grouped)
          .sort(([a], [b]) => a.localeCompare(b, "vi", { numeric: true }))
          .forEach(([groupName, groupMatches]) => {
            const groupDiv = document.createElement("div");
            groupDiv.className = "group";

            const header = document.createElement("h3");
            header.className = "group-header";
            header.textContent = `🏆 ${groupName}`;
            groupDiv.appendChild(header);

            const grid = document.createElement("div");
            grid.className = "group-matches";

            groupMatches.sort((a, b) => {
              const r1 = a.roundName || "";
              const r2 = b.roundName || "";
              if (r1 !== r2) return r1.localeCompare(r2, "vi", { numeric: true });
              return a.matchId.localeCompare(b.matchId, "vi", { numeric: true });
            });

            groupMatches.forEach(({ matchId, home, away, homeScore, awayScore }) => {
              const card = document.createElement("div");
              card.className = "card";
              card.innerHTML = `
                <div class="match-header">⚡ Trận:</div>
                <div class="team home">
                  <span>${home || "Home"}</span>
                  <input type="number" class="homeScore" value="${homeScore ?? 0}">
                </div>
                <div class="team away">
                  <span>${away || "Away"}</span>
                  <input type="number" class="awayScore" value="${awayScore ?? 0}">
                </div>
                <button class="saveBtn">💾 Lưu điểm</button>
              `;

              const homeInput = card.querySelector(".homeScore");
              const awayInput = card.querySelector(".awayScore");
              const saveBtn = card.querySelector(".saveBtn");

              // ✅ Hide button if not `?isRefer=boom`
              if (!isReferBoom) {
                saveBtn.style.display = "none";
              }

              saveBtn.onclick = async () => {
                if (!isReferBoom) return; // Safety
                await update(ref(db, `${path}/${matchId}`), {
                  homeScore: parseInt(homeInput.value) || 0,
                  awayScore: parseInt(awayInput.value) || 0,
                  state: "FINISHED"
                });
                alert(`✅ Đã lưu điểm trận ${matchId}`);
              };

              grid.appendChild(card);
            });

            groupDiv.appendChild(grid);
            container.appendChild(groupDiv);
          });

        // Hide loading overlay after rendering
        hideLoadingOverlay();
      });
    }

    // ── Load from URL params ───────────────────────────────────────────────
    function loadFromUrlParams() {
      const params = new URLSearchParams(window.location.search);
      const tourID = params.get("tourID");

      // Only auto-load if tourID is present
      if (tourID) {
        document.getElementById("tourInput").value = tourID;
        // Auto-load after a short delay to ensure DOM is ready
        setTimeout(() => loadAllMatches(), 100);
      }
    }

    window.loadAllMatches = loadAllMatches;
    window.loadFromUrlParams = loadFromUrlParams;

    // Initialize: Load from URL params on page load
    window.addEventListener("DOMContentLoaded", loadFromUrlParams);
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body { 
      font-family: 'Segoe UI', Arial, sans-serif; 
      padding: 16px; 
      background: #f2f5f9;
    }

    h2 { 
      text-align: center; 
      margin-bottom: 20px; 
      color: #333; 
      font-size: 22px; 
    }

    .input-row { 
      text-align: center; 
      margin-bottom: 20px; 
      display: flex; 
      justify-content: center; 
      gap: 8px; 
    }

    .input-row input { 
      padding: 10px; 
      border-radius: 6px; 
      border: 1px solid #bbb; 
      width: 240px; 
      font-size: 16px; 
    }

    .input-row button { 
      padding: 10px 16px; 
      background: #007bff; 
      border: none; 
      color: #fff; 
      border-radius: 6px; 
      font-weight: bold; 
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .input-row button:hover {
      opacity: 0.9;
    }

    #matchesContainer { 
      display: flex; 
      gap: 16px; 
      overflow-x: auto; 
      padding-bottom: 10px; 
    }

    .group { 
      flex: 0 0 300px; 
      background: #fff; 
      border-radius: 12px; 
      padding: 12px; 
      box-shadow: 0 3px 10px rgba(0,0,0,0.1); 
    }

    .group-header { 
      text-align: center; 
      font-size: 18px; 
    }

    .group-matches { 
      display: flex; 
      flex-direction: column; 
      gap: 14px; 
    }

    .card { 
      background: #fafafa; 
      border-radius: 10px; 
      padding: 14px; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.08); 
    }

    .match-header { 
      font-weight: bold; 
      margin-bottom: 10px; 
    }

    .team { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 6px 10px; 
      border-radius: 6px; 
    }

    .team.home { 
      background: #e3f2fd; 
      color: #0d47a1; 
    }

    .team.away { 
      background: #ffebee; 
      color: #b71c1c; 
    }

    .team input { 
      width: 60px; 
      text-align: center; 
      padding: 6px; 
      border-radius: 4px; 
      border: 1px solid #aaa; 
      font-size: 16px; 
    }

    .saveBtn {
      margin-top: 10px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #00d46a, #00a94b);
      color: #fff;
      letter-spacing: 0.5px;
      box-shadow: 0 6px 14px rgba(0, 200, 83, 0.25);
      transition: 
        transform 0.2s ease,
        box-shadow 0.2s ease,
        filter 0.2s ease;
    }

    .saveBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 18px rgba(0, 200, 83, 0.35);
      filter: brightness(1.05);
    }

    .saveBtn:active {
      transform: translateY(0);
      box-shadow: 0 3px 6px rgba(0, 200, 83, 0.2);
      filter: brightness(0.95);
    }

    /* Loading Animation */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(242, 245, 249, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(100, 150, 200, 0.3);
      border-top-color: #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 18px;
      font-weight: 500;
      color: #333;
      letter-spacing: 0.5px;
      animation: fadeInOut 1.5s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <h2>Danh sách tất cả trận đấu</h2>
  <div class="input-row">
    <input type="text" id="tourInput" placeholder="Nhập Tournament ID">
    <button onclick="loadAllMatches()">Tải trận đấu</button>
  </div>
  <div id="matchesContainer"></div>

  <!-- Loading Overlay -->
  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loader-spinner"></div>
    <div class="loading-text">Đang tải trận đấu...</div>
  </div>
</body>
</html>
